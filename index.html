<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPAS 刷題 · 中級 AI 應用規劃師</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15212b; --ink-2:#33424f; --muted:#6a7785; --line:#dfddd5;
  --paper:#f4f2ed; --surface:#ffffff; --surface-2:#faf8f3;
  --brand:#157a6e; --brand-deep:#0f5a52; --brand-soft:#e2efec;
  --hi:#f2b233; --hi-soft:#fbe9c4;
  --ok:#2e9e5b; --ok-soft:#e3f4ea; --bad:#d64550; --bad-soft:#fbe6e7;
  --s1:#157a6e; --s3:#b9603a;            /* 科目色 */
  --radius:14px; --radius-s:9px;
  --shadow:0 1px 2px rgba(21,33,43,.05),0 8px 26px -16px rgba(21,33,43,.28);
  --shadow-lg:0 24px 60px -28px rgba(21,33,43,.45);
  --font:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC","Segoe UI",system-ui,sans-serif;
  --disp:"Space Grotesk",var(--font);
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
}
[data-theme="dark"]{
  --ink:#eef1f3; --ink-2:#c5ccd2; --muted:#8b97a2; --line:#2b3742;
  --paper:#10171e; --surface:#161f28; --surface-2:#1b2630;
  --brand:#3fb6a6; --brand-deep:#5ccabb; --brand-soft:#16322e;
  --hi:#f4c25a; --hi-soft:#3a2f15;
  --ok:#46c07b; --ok-soft:#15301f; --bad:#ef6b73; --bad-soft:#36181b;
  --s1:#3fb6a6; --s3:#d98a5f;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -18px rgba(0,0,0,.7);
  --shadow-lg:0 28px 70px -30px rgba(0,0,0,.8);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font); background:var(--paper); color:var(--ink);
  line-height:1.7; -webkit-font-smoothing:antialiased; letter-spacing:.01em;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--hi-soft)}
.wrap{max-width:840px;margin:0 auto;padding:0 20px}

/* ---------- header ---------- */
header.top{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--paper) 86%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.top-in{max-width:840px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:baseline;gap:9px;cursor:pointer;user-select:none}
.brand .mark{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:-.02em;color:var(--ink)}
.brand .mark b{color:var(--brand)}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:.06em}
.top-stats{margin-left:auto;display:flex;gap:18px;align-items:center}
.tstat{text-align:right;line-height:1.15}
.tstat .n{font-family:var(--disp);font-weight:600;font-size:15px}
.tstat .l{font-size:10px;color:var(--muted);letter-spacing:.05em}
.icon-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--ink-2);
  border:1px solid var(--line);background:var(--surface);transition:.15s}
.icon-btn:hover{color:var(--brand);border-color:var(--brand)}

/* ---------- generic ---------- */
.eyebrow{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted)}
.hl{background:linear-gradient(transparent 62%,var(--hi-soft) 62%);padding:0 2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;
  padding:12px 20px;border-radius:var(--radius-s);transition:.16s;font-size:15px;border:1px solid transparent}
.btn-primary{background:var(--brand);color:#fff;box-shadow:var(--shadow)}
.btn-primary:hover{background:var(--brand-deep)}
.btn-ghost{background:var(--surface);color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ---------- home ---------- */
section{padding:34px 0}
.hero{padding:46px 0 30px}
.hero h1{font-size:clamp(28px,6vw,42px);line-height:1.18;font-weight:700;margin:14px 0 12px;letter-spacing:-.01em}
.hero p{color:var(--ink-2);font-size:16px;max-width:30em;margin:0 0 26px}
.cta-row{display:flex;flex-wrap:wrap;gap:10px}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}
.chip{font-size:13.5px;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink-2);display:inline-flex;align-items:center;gap:7px;transition:.15s}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip .cnt{font-family:var(--disp);font-size:12px;color:var(--muted)}

.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.sec-head h2{font-size:18px;font-weight:700;margin:0}

.papers{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:620px){.papers{grid-template-columns:1fr}.top-stats .tstat:nth-child(2){display:none}}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
  cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.pcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:color-mix(in srgb,var(--brand) 40%,var(--line))}
.pcard .tag{font-family:var(--disp);font-size:10.5px;font-weight:600;letter-spacing:.08em;
  padding:3px 8px;border-radius:6px;display:inline-block}
.pcard h3{font-size:16px;margin:12px 0 3px;font-weight:700}
.pcard .meta{font-size:12.5px;color:var(--muted)}
.pbar{height:6px;border-radius:99px;background:var(--line);margin-top:14px;overflow:hidden}
.pbar i{display:block;height:100%;border-radius:99px;transition:width .5s}
.pcard .stat{display:flex;justify-content:space-between;margin-top:9px;font-size:12px;color:var(--muted)}
.pcard .stat b{font-family:var(--disp);color:var(--ink);font-weight:600}

/* ---------- quiz ---------- */
.qtopbar{display:flex;align-items:center;gap:12px;padding:14px 0 6px}
.qtopbar .back{font-size:14px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.qtopbar .back:hover{color:var(--brand)}
.qprog{flex:1;height:6px;border-radius:99px;background:var(--line);overflow:hidden}
.qprog i{display:block;height:100%;background:var(--brand);border-radius:99px;transition:width .35s}
.qcount{font-family:var(--disp);font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap}
.exam-timer{font-family:var(--disp);font-size:13px;font-weight:700;white-space:nowrap;padding:5px 11px;
  border-radius:99px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);
  display:inline-flex;align-items:center;gap:6px}
.exam-timer::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--brand)}
.exam-timer.warn{background:var(--bad-soft);border-color:var(--bad);color:var(--bad);animation:pulse 1s infinite}
.exam-timer.warn::before{background:var(--bad)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.qcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:24px;margin-top:8px}
.qmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.qmeta .pill{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.04em;
  padding:3px 9px;border-radius:6px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2)}
.qmeta .star{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;
  color:var(--muted);border:1px solid var(--line);transition:.15s}
.qmeta .star.on{color:var(--hi);border-color:var(--hi)}
.qmeta .star:hover{color:var(--hi)}
.qtext{font-size:17.5px;line-height:1.75;color:var(--ink);font-weight:500}
.qcode{font-family:var(--mono);font-size:12.5px;line-height:1.6;background:var(--surface-2);
  border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:8px;
  padding:13px 15px;margin:14px 0 2px;white-space:pre;overflow-x:auto;color:var(--ink-2)}

.opts{margin-top:18px;display:flex;flex-direction:column;gap:10px}
.opt{display:flex;gap:13px;align-items:flex-start;text-align:left;padding:13px 15px;border-radius:var(--radius-s);
  border:1.5px solid var(--line);background:var(--surface);transition:.14s;font-size:15px;line-height:1.6;width:100%}
.opt:not(.locked):hover{border-color:var(--brand);background:var(--surface-2)}
.opt .key{flex-shrink:0;width:26px;height:26px;border-radius:7px;display:grid;place-items:center;
  font-family:var(--disp);font-weight:600;font-size:14px;background:var(--surface-2);
  border:1px solid var(--line);color:var(--ink-2);transition:.14s}
.opt .txt{flex:1;padding-top:1px}
.opt.sel{border-color:var(--brand)}
.opt.sel .key{background:var(--brand);color:#fff;border-color:var(--brand)}
.opt.correct{border-color:var(--ok);background:var(--ok-soft)}
.opt.correct .key{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.opt.wrong .key{background:var(--bad);color:#fff;border-color:var(--bad)}
.opt.locked{cursor:default}
.opt.dim{opacity:.55}

.feedback{margin-top:16px;border-radius:var(--radius-s);padding:14px 16px;font-size:14px;line-height:1.7;
  display:none;animation:slideIn .3s ease}
.feedback.show{display:block}
.feedback.r-ok{background:var(--ok-soft);border:1px solid color-mix(in srgb,var(--ok) 40%,transparent)}
.feedback.r-bad{background:var(--bad-soft);border:1px solid color-mix(in srgb,var(--bad) 40%,transparent)}
.feedback .ft{font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.feedback.r-ok .ft{color:var(--ok)} .feedback.r-bad .ft{color:var(--bad)}
.feedback .note{color:var(--ink-2)}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.qnav{display:flex;gap:10px;margin-top:18px;align-items:center}
.qnav .spacer{flex:1}
.btn-sm{padding:10px 16px;font-size:14px;border-radius:var(--radius-s)}
.linklike{font-size:13px;color:var(--muted)}
.linklike:hover{color:var(--brand)}

/* palette */
.palette{margin-top:18px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:none}
.palette.show{display:block}
.palette h4{margin:0 0 12px;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.04em}
.pgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:7px}
@media(max-width:520px){.pgrid{grid-template-columns:repeat(8,1fr)}}
.pcell{aspect-ratio:1;border-radius:7px;display:grid;place-items:center;font-family:var(--disp);
  font-size:12.5px;font-weight:600;border:1.5px solid var(--line);background:var(--surface-2);color:var(--ink-2);transition:.12s}
.pcell:hover{border-color:var(--brand)}
.pcell.cur{outline:2px solid var(--brand);outline-offset:1px}
.pcell.ans{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.pcell.ok{background:var(--ok-soft);border-color:var(--ok);color:var(--ok)}
.pcell.no{background:var(--bad-soft);border-color:var(--bad);color:var(--bad)}
.plegend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11.5px;color:var(--muted)}
.plegend span{display:inline-flex;align-items:center;gap:5px}
.plegend i{width:11px;height:11px;border-radius:3px;display:inline-block;border:1px solid var(--line)}

/* ---------- result ---------- */
.result{text-align:center;padding:28px 0}
.ring-wrap{position:relative;width:180px;height:180px;margin:6px auto 18px}
.ring-wrap .score{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.ring-wrap .score .big{font-family:var(--disp);font-size:44px;font-weight:700;line-height:1}
.ring-wrap .score .lbl{font-size:12px;color:var(--muted);margin-top:3px}
.verdict{font-size:20px;font-weight:700;margin:4px 0 6px}
.verdict.pass{color:var(--ok)} .verdict.fail{color:var(--bad)}
.rstats{display:flex;justify-content:center;gap:26px;margin:18px 0 24px}
.rstats .it{text-align:center}
.rstats .it .n{font-family:var(--disp);font-size:24px;font-weight:600}
.rstats .it .l{font-size:12px;color:var(--muted)}
.review-list{text-align:left;margin-top:14px;display:flex;flex-direction:column;gap:8px}
.rev{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--bad);
  border-radius:9px;padding:12px 15px;cursor:pointer;transition:.14s}
.rev.ok{border-left-color:var(--ok)}
.rev:hover{box-shadow:var(--shadow)}
.rev .h{display:flex;gap:9px;align-items:center;font-size:12.5px;color:var(--muted);margin-bottom:5px}
.rev .h .pill{font-family:var(--disp);font-size:10.5px;padding:2px 7px;border-radius:5px;background:var(--surface-2);border:1px solid var(--line)}
.rev .q{font-size:14px;color:var(--ink);line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rev .ans{font-size:12.5px;margin-top:6px}
.rev .ans b{font-family:var(--disp)}
.tag-ok{color:var(--ok)} .tag-bad{color:var(--bad)}

.empty{text-align:center;color:var(--muted);padding:50px 20px}
.empty .big{font-size:34px;margin-bottom:8px}

footer{padding:34px 0 50px;color:var(--muted);font-size:12px;text-align:center;line-height:1.7}
footer a{color:var(--muted)}

/* modal */
.modal{position:fixed;inset:0;background:rgba(20,30,40,.45);backdrop-filter:blur(2px);z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .box{background:var(--surface);border-radius:var(--radius);max-width:380px;width:100%;
  padding:24px;box-shadow:var(--shadow-lg)}
.modal h3{margin:0 0 8px;font-size:18px}
.modal p{color:var(--ink-2);font-size:14px;margin:0 0 18px}
.modal .row{display:flex;gap:10px;justify-content:flex-end}
.seg{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:4px;margin:14px 0}
.seg button{flex:1;padding:9px;border-radius:7px;font-size:13.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--brand);box-shadow:var(--shadow)}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="brand" onclick="go('home')">
      <span class="mark">刷題<b>·</b>iPAS</span>
      <span class="sub">中級 AI 應用規劃師</span>
    </div>
    <div class="top-stats">
      <div class="tstat"><div class="n" id="ts-done">0</div><div class="l">已作答</div></div>
      <div class="tstat"><div class="n" id="ts-acc">—</div><div class="l">正確率</div></div>
      <button class="icon-btn" id="theme-btn" title="切換深色/淺色" onclick="toggleTheme()">◐</button>
    </div>
  </div>
</header>

<main id="app"></main>

<div class="modal" id="modal">
  <div class="box">
    <h3 id="m-title"></h3>
    <p id="m-body"></p>
    <div class="row">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-sm" id="m-ok"></button>
    </div>
  </div>
</div>

<footer class="wrap">
  資料來源：iPAS 經濟部產業人才能力鑑定「中級 AI 應用規劃師」歷屆公告試題（114-2、115-1，科目一＋科目三，共 200 題），以及官方學習指引教材附練習題（70 題，含詳解）。<br>
  本工具僅供自我練習，答案以官方公告為準。<span id="store-note">進度儲存在你的瀏覽器中。</span>
  <span style="white-space:nowrap">　<a href="#" onclick="exportData(event)">匯出備份</a> · <a href="#" onclick="importData(event)">匯入備份</a></span>
</footer>

<script>
const QUESTIONS = [
{"paper":"114-2","subject":"科目一","num":1,"q":"某電商企業希望利用自然語言處理（NLP）技術，分析顧客在社群平台與商品評論中的文字內容，以即時掌握顧客對產品的滿意度變化。若採用情感分析（Sentiment Analysis）模型，其主要目的為何？","opts":["預測顧客使用的語言風格與語氣","判斷文本中所表達的情感傾向","將顧客留言自動翻譯成企業內部指定語言","產生顧客評論的自動化摘要內容"],"ans":"B","id":1},
{"paper":"114-2","subject":"科目一","num":2,"q":"某跨國金融科技公司導入 Transformer 架構開發多語客服系統，以提升長篇金融文件的自動翻譯品質。下列何者為該模型能顯著改善翻譯準確度的主要原因？","opts":["透過自注意力機制（Self-Attention）捕捉長距離語境依賴關係","透過卷積運算（Convolution）加速訓練過程","透過強化學習自動調整語句生成策略","透過資料增強平衡多語語料比例"],"ans":"A","id":2},
{"paper":"114-2","subject":"科目一","num":3,"q":"某企業計畫應用 BERT 模型分析大量顧客意見。在 BERT 的預訓練過程中，「遮罩語言模型（MLM）」的主要訓練策略為何？","opts":["依序遮罩句尾詞語，讓模型從左到右逐步生成完整句子","隨機遮罩部分詞語，並讓模型根據雙向上下文預測被遮罩的詞","透過對抗訓練生成語意相似的擾動樣本以提升泛化性","以未遮罩的詞為條件，使用解碼器結構重建整句內容"],"ans":"B","id":3},
{"paper":"114-2","subject":"科目一","num":4,"q":"在詞向量訓練方法中，GloVe 與 Word2Vec 的主要差異為何？","opts":["Word2Vec 以詞頻權重訓練，而 GloVe 以隨機初始化向量學習","Word2Vec 以全局統計矩陣為基礎，而 GloVe 採用神經網路進行上下文預測","Word2Vec 為基於預測的模型，而 GloVe 為基於共現統計的模型","Word2Vec 僅能用於靜態語料，而 GloVe 可應用於即時語料更新"],"ans":"C","id":4},

{"paper":"指引","subject":"科目一","num":1,"q":"在評估企業AI導入可行性時，下列哪一項屬於「商業價值評估」的考量？","opts":["模型參數量大小","開發人員數量","預期效益與回報","演算法選擇難度"],"ans":"C","note":"商業價值評估主要衡量AI專案在解決問題或創造價值上的潛力，例如降低成本、增加收入或提升效率。","src":"guide","id":211},
{"paper":"指引","subject":"科目一","num":2,"q":"在進行AI導入評估時，為確保企業體系具備執行能力，應考量下列哪一項？","opts":["使用者介面風格","技術成熟度與部署資源","品牌識別度","客服滿意度"],"ans":"B","note":"技術評估是導入前的重要環節，需確認所選技術是否穩定且能在現有架構下順利實作。","src":"guide","id":212},
{"paper":"指引","subject":"科目一","num":3,"q":"企業進行AI導入前的評估分析，通常第一步應聚焦於？","opts":["演算法選擇","資料標註工具","業務痛點與需求辨識","建立測試模型"],"ans":"C","note":"AI導入需以業務需求為出發點，若無明確問題定義，後續模型開發將失焦或無法產生實際效益。","src":"guide","id":213},

{"paper":"指引","subject":"科目一","num":5,"q":"在AI導入規劃過程中，為確保專案順利推進並落實業務需求，下列哪一項規劃內容最能避免部門間溝通斷裂與責任不清的風險？","opts":["確認所採用演算法的最新研究成果","由高階主管全權拍板模型選擇與部署方式","建立跨部門協作機制與角色分工","優先採購效能最佳的GPU運算資源"],"ans":"C","note":"AI導入需橫跨業務、資料、IT等多部門，若缺乏明確的溝通與分工安排，容易出現責任模糊或推進不順。建立協作機制可確保需求對齊、資料準備、模型開發與部署流程協同一致，是規劃階段關鍵工作。其他選項則過度聚焦於單點技術或管理決策，無法解決跨部門合作問題。","src":"guide","id":215},
{"paper":"指引","subject":"科目一","num":6,"q":"當AI導入規劃需評估系統部署模式時，若考量資料隱私與本地控制需求，應優先考慮？","opts":["第三方雲端部署","地端私有部署","區塊鏈儲存方式","外包給AI公司"],"ans":"B","note":"地端部署可提供更強的資料控制與隱私保障，常見於金融、政府、醫療等敏感領域。","src":"guide","id":216},
{"paper":"指引","subject":"科目一","num":7,"q":"在AI風險評估中，若模型輸出不穩定且缺乏邏輯可解釋性，可能帶來哪一風險？","opts":["模型效率過高","公平性過度提升","決策透明性不足","資料使用效率太高"],"ans":"C","note":"模型無法解釋其輸出會降低使用者與監管單位的信任，是常見的AI風險來源之一。","src":"guide","id":217},

{"paper":"指引","subject":"科目一","num":9,"q":"為管理AI導入過程中的「法律與合規風險」，企業應採取何種措施？","opts":["強化演算法複雜度","減少模型訓練次數","檢視個資使用的合法性","加速模型部署速度"],"ans":"C","note":"若使用涉及個人資料，須確認是否符合資料保護法（如GDPR或個資法）規範。","src":"guide","id":219},
{"paper":"指引","subject":"科目一","num":10,"q":"AI模型部署後，若長期輸入資料分佈逐漸改變，導致模型效能下降，最適合採取下列哪一項作法進行風險管理？","opts":["定期重啟伺服器以排除效能問題","加入多個冗餘模型以進行同時預測","建置概念漂移監控與觸發模型再訓練流程","縮減模型層數以降低計算成本"],"ans":"C","note":"概念漂移（Concept Drift）指資料分佈隨時間改變，可能使模型預測確率下降，因此在風險管理架構中，須建置監控機制偵測輸入與輸出異常，並結合模型再訓練策略進行調整。選項（A）（D）與風險無直接關聯，（B）雖具備冗餘設計概念，但不直接針對資料變異處理。隨著人工智慧專案進入實質運行階段，從前期的AI導入評估與規劃到技術落地與系統部署，企業必須面對的不僅僅是選擇合適的模型或框架，還涉及資料品質的掌控、模型的選擇與調整、以及與現有業務系統與流程的整合。","src":"guide","id":220},
{"paper":"指引","subject":"科目一","num":1,"q":"在進行AI建模前，進行「資料標註」的主要目的是？","opts":["減少資料容量","強化系統安全性","讓模型能夠辨識輸入與目標之間的對應關係","提升資料儲存速度"],"ans":"C","note":"資料標註是監督式學習的關鍵步驟，能讓模型理解每筆資料對應的標籤或結果。","src":"guide","id":221},
{"paper":"指引","subject":"科目一","num":2,"q":"在特徵工程中，進行特徵標準化（如Z-score標準化）的主要目的是？","opts":["增加欄位數量","提升資料壓縮效率","將特徵縮放至相同尺度，利於模型學習","將文字轉換為向量"],"ans":"C","note":"許多演算法（如SVM、KNN）對特徵尺度敏感，標準化有助於提升模型表現與穩定性。","src":"guide","id":222},
{"paper":"指引","subject":"科目一","num":3,"q":"若某企業的目標是預測顧客是否會流失，最適合選用下列哪一種模型任務？","opts":["分類任務","迴歸任務","生成任務","分群任務"],"ans":"A","note":"顧客流失通常為「會 /不會」的二元分類問題，適合使用分類模型如Logistic Regression、決策樹等。","src":"guide","id":223},
{"paper":"指引","subject":"科目一","num":4,"q":"關於模型選擇，下列哪一項敘述較為正確？","opts":["模型越複雜越好","模型應優先考慮開發成本與可部署性","只要準確率高就不需考慮其他指標","模型無須考慮資料量大小"],"ans":"B","note":"選擇模型需考量資料特性、開發時間、計算成本與後續維運難度，不應一味追求複雜度。","src":"guide","id":224},
{"paper":"指引","subject":"科目一","num":5,"q":"下列哪一種資料前處理技術主要用來處理缺失值？","opts":["資料增強","標準化","插補法","降維"],"ans":"C","note":"插補法（Imputation）可用平均數、中位數、眾數或模型預測方式填補缺失欄位，常用於資料清理階段。","src":"guide","id":225},
{"paper":"指引","subject":"科目一","num":6,"q":"在設計AI應用系統架構時，使用容器技術（如Docker）的主要優點為？","opts":["加快資料標註速度","提升API回應速度","促進模型跨平台部署與環境一致性","減少模型所需參數量"],"ans":"C","note":"容器技術可封裝應用與其依賴環境，確保模型從開發到部署保持一致。","src":"guide","id":226},
{"paper":"指引","subject":"科目一","num":7,"q":"MLOps的主要目的為何？","opts":["壓縮模型參數","簡化使用者介面設計","實現AI模型的自動化開發、部署與持續維運流程","將AI模型嵌入硬體晶片"],"ans":"C","note":"MLOps結合DevOps與機器學習，可實現模型生命週期的持續整合、測試與監控。","src":"guide","id":227},
{"paper":"指引","subject":"科目一","num":8,"q":"在邊緣運算架構中，AI模型的推論通常會發生在哪裡？","opts":["雲端GPU伺服器","終端裝置本地端","資料標註平台","資料儲存庫"],"ans":"B","note":"邊緣AI將模型部署至如手機、攝影機、感測器等裝置上，提升即時性並減少延遲。","src":"guide","id":228},
{"paper":"指引","subject":"科目一","num":9,"q":"持續監控部署後AI模型效能的主要目的為何？","opts":["減少資料備份空間","提升UI使用效率","偵測模型概念漂移與效能下降","強化模型壓縮效果"],"ans":"C","note":"模型部署後若輸入資料特性改變，將可能導致預測不準，故需建立監控機制。","src":"guide","id":229},
{"paper":"指引","subject":"科目一","num":10,"q":"在AI系統整合過程中，為確保模型可與業務流程無縫對接，通常需要哪種角色協作？","opts":["社群經營人員","資料標註員","產品經理與工程人員","硬體維修技術員"],"ans":"C","note":"產品經理負責需求對齊與驗證場景，工程人員負責將模型封裝並整合至應用流程。","src":"guide","id":230},
{"paper":"指引","subject":"科目三","num":1,"q":"若欲描述隨機變數在連續範圍內取值的機率分佈，最適合使用下列哪一種函數？","opts":["機率質量函數（PMF）","條件機率","機率密度函數（PDF）","累積分佈函數（CDF）"],"ans":"C","note":"機率密度函數（PDF）用於描述連續型隨機變數於某個取值範圍內的機率分佈。與離散型隨機變數不同，連續變數在單一點的機率為零，PDF通常透過積分計算區間內的機率，而PMF則用於離散型變數。累積分佈函數（CDF）則是累計機率的工具，而非直接描述機率密度。","src":"guide","id":231},
{"paper":"指引","subject":"科目三","num":2,"q":"若一個隨機變數服從伯努利分佈（Bernoulli Distribution），則該變數可能取值為下列哪一組？","opts":["任何實數","0或1","正整數","任意整數"],"ans":"B","note":"伯努利分佈是典型的二元分佈，僅有兩種可能結果，通常以0和1表示，例如成功與失敗、點擊與未點擊。此分佈是多數二元分類模型（如邏輯迴歸）的理論基礎。","src":"guide","id":232},
{"paper":"指引","subject":"科目三","num":3,"q":"在主成分分析（PCA）中，常使用哪一種矩陣分解技術來找出資料的主軸方向？","opts":["矩陣求逆","矩陣轉置","特徵值分解","條件機率分解"],"ans":"C","note":"PCA透過對協方差矩陣進行特徵值分解，找出最大變異方向，並以此降低維度並保留最重要的資訊。這能讓資料投影到較少的維度上，同時盡可能維持原始資料的變異。","src":"guide","id":233},
{"paper":"指引","subject":"科目三","num":4,"q":"若想將高維資料映射至較低維度空間，同時保留資料的主要變異，常用下列哪一種方法？","opts":["邊際機率估計","矩陣轉置","主成分分析","累積機率計算"],"ans":"C","note":"PCA是常用的維度簡化工具，透過線性變換找出資料中變異最大的方向，將原始高維度資料投影到較少維度上，達到資料壓縮與特徵提取的效果。","src":"guide","id":234},
{"paper":"指引","subject":"科目三","num":5,"q":"在梯度下降（Gradient Descent）中，「梯度」代表下列哪一項？","opts":["資料點個數","模型精確度","損失函數對參數的偏微分","模型計算速度"],"ans":"C","note":"梯度是損失函數相對於模型參數的導數，能指引參數應往哪個方向調整以減少損失。梯度越大，表示調整幅度應越大，以快速降低誤差。","src":"guide","id":235},
{"paper":"指引","subject":"科目三","num":6,"q":"在進行假設檢定時，顯著水準（α）表示什麼？","opts":["平均值的大小","模型運算速度","拒絕虛無假設時所容許的型一錯誤機率","資料筆數多少"],"ans":"C","note":"顯著水準（α）是研究者事先設定的風險上限，代表當虛無假設為真時，錯誤拒絕該假設的容忍機率。常見設定為0.05，意即容許5%的型一錯誤。","src":"guide","id":236},
{"paper":"指引","subject":"科目三","num":7,"q":"若資料集中存在極端值，以下哪一種集中趨勢指標較不受影響？","opts":["平均數","變異數","標準差","中位數"],"ans":"D","note":"平均數會受極端值拉動而偏離中心位置。中位數則是將資料排序後取中間值，不會受到少數極端值的嚴重影響，因此在偏態分佈或極端值存在時，常用中位數描述資料集中趨勢。","src":"guide","id":237},
{"paper":"指引","subject":"科目三","num":8,"q":"以下哪一種優化方法會累積每個參數的歷史梯度大小，以調整學習率？","opts":["Momentum","Adagrad","SGD","Batch Normalization"],"ans":"B","note":"Adagrad根據各參數歷史梯度平方和，調整每個參數的學習率。對變動較少的參數保留較高學習率，而對變動大的參數降低學習率，特別適合處理稀疏特徵資料。","src":"guide","id":238},
{"paper":"指引","subject":"科目三","num":9,"q":"當深度學習模型在訓練時出現梯度爆炸現象，應優先採用哪種技術加以處理？","opts":["增大學習率","梯度裁剪（Gradient Clipping）","減少資料量","刪除輸入特徵"],"ans":"B","note":"梯度爆炸會導致權重變動過大甚至溢出，影響模型穩定性。梯度裁剪能限制梯度的最大值，防止數值爆炸，特別適用於深度神經網路或RNN訓練。","src":"guide","id":239},
{"paper":"指引","subject":"科目三","num":10,"q":"邏輯迴歸（Logistic Regression）模型在處理二元分類問題時，通常假設目標變數服從哪種分佈？","opts":["常態分佈","均勻分佈","伯努利分佈","泊松分佈"],"ans":"C","note":"邏輯迴歸假設目標變數為二元型態（如0或1），服從伯努利分佈，並透過sigmoid函數將預測值映射至機率區間[0, 1]，以完成二元分類。隨著資料規模與計算能力的提升，機器學習（Machine Learning）已成為人工智慧應用的核心基礎，而深度學習（Deep Learning）則進一步突破傳統模型的限制，在語音辨識、影像理解、自然語言處理等領域取得重大進展。本章將從機器學習的基本原理與常見技術出發，逐步延伸至深度學習的架構與實務應用，系統性建構從經典演算法到現代神經網路的技術地圖。","src":"guide","id":240},
{"paper":"指引","subject":"科目三","num":1,"q":"機器學習（Machine Learning）中，若輸入資料沒有標註，欲探索潛在的群組或模式，應屬於哪種學習類型？","opts":["監督式學習（Supervised Learning）","半監督式學習（Semi-supervised Learning）","非監督式學習（Unsupervised Learning）","強化式學習（Reinforcement Learning）"],"ans":"C","note":"非監督式學習（Unsupervised Learning）不依賴標註資料，主要目的是從 資料 中發 現潛 在結 構、 模式 或分 佈， 例如 分群 （ Clustering ）、降 維（Dimensionality Reduction）等技術，是探索性資料分析的重要工具。","src":"guide","id":241},
{"paper":"指引","subject":"科目三","num":2,"q":"在監督式學習中，當模型要預測一個連續數值時，這種任務稱為什麼？","opts":["分類（Classification）","迴歸（Regression）","聚類（Clustering）","降維（Dimensionality Reduction）"],"ans":"B","note":"迴歸（Regression）是預測連續數值的任務，如房價預測、氣溫預測等，與分類不同，分類是用來預測離散類別結果。","src":"guide","id":242},
{"paper":"指引","subject":"科目三","num":3,"q":"在深度學習中，用於學習資料中局部特徵的網路架構通常是什麼？","opts":["循環神經網路（Recurrent Neural Network, RNN）","決策樹（Decision Tree）","卷積神經網路（Convolutional Neural Network, CNN）","隨機森林（Random Forest）"],"ans":"C","note":"卷積神經網路（CNN）透過卷積層偵測局部特徵，尤其擅長處理影像、語音等有空間或時間結構的資料，是深度學習中重要的基礎架構之一。","src":"guide","id":243},
{"paper":"指引","subject":"科目三","num":4,"q":"支援向量機（Support Vector Machine, SVM）若用於迴歸問題，稱為什麼？","opts":["Logistic Regression","Decision Tree Regression","Random Forest","Support Vector Regression"],"ans":"D","note":"當支援向量機（SVM）應用於連續數值的預測問題時，稱為支援向量迴歸（Support Vector Regression, SVR）。SVR與傳統SVM不同，目標是尋找一條最佳超平面，使大多數資料點落在預設的誤差範圍內。","src":"guide","id":244},
{"paper":"指引","subject":"科目三","num":5,"q":"機器學習模型若過度學習訓練資料中的雜訊，導致泛化能力下降，此現象稱為什麼？","opts":["欠擬合（Underfitting）","過擬合（Overfitting）","特徵縮放（Feature Scaling）","梯度爆炸（Gradient Explosion）"],"ans":"B","note":"過擬合（Overfitting）是指模型在訓練資料上表現極好，卻無法在未知新資料上維持預測效能，通常是因為模型過於複雜，學習到不具代表性的噪聲。","src":"guide","id":245},
{"paper":"指引","subject":"科目三","num":6,"q":"在深度學習中，哪一個是為了引入非線性，使神經網路能學習複雜模式的元件？","opts":["損失函數（Loss Function）","激活函數（Activation Function）","隱藏層（Hidden Layer）","梯度下降（Gradient Descent）"],"ans":"B","note":"激活函數（Activation Function）如ReLU、Sigmoid等，為神經網路帶來非線性能力，若沒有激活函數，多層網路仍只是線性變換，無法表現複雜的關係。","src":"guide","id":246},
{"paper":"指引","subject":"科目三","num":7,"q":"若想在機器學習中降低模型過度擬合風險，可採用哪種方法？","opts":["提高學習率","減少資料量","正則化（Regularization）","隨機刪除特徵"],"ans":"C","note":"正則化（Regularization）透過在損失函數中加入L1或L2懲罰項，限制模型權重的大小，減少模型過度擬合訓練資料，提升泛化能力。","src":"guide","id":247},
{"paper":"指引","subject":"科目三","num":8,"q":"在深度學習模型的訓練過程中，計算模型輸出與實際值差距的函數稱為什麼？","opts":["激活函數（Activation Function）","池化函數（Pooling Function）","損失函數（Loss Function）","梯度函數（Gradient Function）"],"ans":"C","note":"損失函數（Loss Function）用來衡量模型預測值與實際值的差距，是指引優化器調整參數方向的重要依據。常見如均方誤差（ MSE）、交叉熵損失（Cross-Entropy Loss）等。","src":"guide","id":248},
{"paper":"指引","subject":"科目三","num":9,"q":"Transformer模型中用來捕捉輸入序列不同位置間依賴關係的核心機制是什麼？","opts":["池化機制（Pooling）","注意力機制（Attention）","決策樹分支","激活函數（Activation Function）"],"ans":"B","note":"Transformer模型核心在於注意力機制（Attention），透過計算序列中各元素間的關聯權重，捕捉長距離依賴，徹底取代傳統RNN的循環架構，大幅提升計算效率與表現。","src":"guide","id":249},
{"paper":"指引","subject":"科目三","num":10,"q":"在決策樹模型中，用於判斷分裂效果好壞的指標，常見的是下列哪一種？","opts":["機率密度函數（Probability Density Function）","均方根誤差（Root Mean Squared Error）","基尼不純度（Gini Impurity）","卷積核大小（Kernel Size）"],"ans":"C","note":"基尼不純度（Gini Impurity）衡量節點內樣本的不純度，數值越低表示節點內樣本越集中於單一類別，是決策樹演算法常用的分裂判斷依據，尤其在分類任務中扮演重要角色。機器學習模型的效能不僅取決於演算法本身，更仰賴整體建模流程中每一個環節的設計與執行品質。從資料整理、特徵建構，到模型選擇、訓練與優化，每一個步驟都直接影響最終預測結果的準確性與穩定性。因此，模型建構並非單一演算法的套用，而是一套完整且需反覆調整的工程流程。","src":"guide","id":250},
{"paper":"指引","subject":"科目三","num":1,"q":"針對缺失值（Missing Value）的處理，下列哪種方法屬於利用模型進行補值的方式？","opts":["刪除法（Deletion）","均值填補（Mean Imputation）","預測模型填補（Predictive Imputation）","缺失指標編碼（Missing Indicator）"],"ans":"C","note":"預測模型填補是利用其他特徵變數訓練模型，如迴歸或分類器，預測缺失值的位置或值，特別適用於特徵之間關聯性高的情況。相對於簡單的刪除或均值填補，模型補值能更好地捕捉數據內在關聯性，降低資訊流失。","src":"guide","id":251},
{"paper":"指引","subject":"科目三","num":2,"q":"在進行異常值（Outlier）偵測時，哪種方法是利用統計特徵分佈來判斷離群點？","opts":["KNN補值","四分位距法（IQR）","Isolation Forest","One-hot Encoding"],"ans":"B","note":"四分位距法是常見的統計方法，透過計算資料的第一與第三四分位數（Q1與Q3），並判定距離超過IQR（四分位距）1.5倍以上的數據點為異常。這種方法直觀且適用於大多數數值型資料的初步檢查。","src":"guide","id":252},
{"paper":"指引","subject":"科目三","num":3,"q":"下列哪一種特徵選擇方法會直接在模型訓練過程中進行特徵挑選？","opts":["Filter方法","Wrapper方法","Embedded方法","One-hot Encoding"],"ans":"C","note":"Embedded方法會在模型訓練過程中同步進行特徵挑選。例如決策樹模型會產生特徵重要性（Feature Importance），或像Lasso、Ridge透過正則化直接控制特徵權重，實現同時建模與特徵選擇的目標。","src":"guide","id":253},
{"paper":"指引","subject":"科目三","num":4,"q":"在進行特徵轉換時，若資料存在極端偏高的右偏分佈，常用哪種轉換以降低偏態？","opts":["平方根轉換（Square Root Transform）","對數轉換（Log Transform）","Label Encoding","缺失指標編碼"],"ans":"B","note":"對數轉換可有效降低右偏分佈的極端值影響，使資料分佈更接近常態。常用於收入、銷售額等具極端高值的變數。平方根轉換則較適用於中度偏態資料。","src":"guide","id":254},
{"paper":"指引","subject":"科目三","num":5,"q":"在模型訓練過程中，若模型在訓練集表現良好，但測試集效能不佳，可能是發生了什麼問題？","opts":["欠擬合","特徵縮放失敗","過擬合","批次大小過小"],"ans":"C","note":"過擬合發生在模型學習了太多訓練集的細節與雜訊，導致在未見過的測試資料上表現不佳。常見解決方案包括使用正則化、降低模型複雜度或早停策略（Early Stopping）。","src":"guide","id":255},
{"paper":"指引","subject":"科目三","num":6,"q":"交叉驗證中，哪一種方法在每次驗證中只留下一筆樣本作為驗證集，其餘皆用於訓練？","opts":["K-fold","Stratified K-fold","LOOCV","Repeated K-fold"],"ans":"C","note":"LOOCV（Leave-One-Out Cross-Validation）是K-fold的極端形式，當K等於樣本數n時，每次只留一筆做驗證。此方法能最大化資料利用，但計算成本極高，不適用於大樣本情境。","src":"guide","id":256},
{"paper":"指引","subject":"科目三","num":7,"q":"在訓練深度學習模型時，隨機將部分神經元暫時關閉以減少過擬合的技術是什麼？","opts":["Early Stopping","Dropout","Batch Normalization","Quantization"],"ans":"B","note":"Dropout透過隨機將神經元暫時設為零，迫使模型在每次訓練都以不同的「子網路」進行學習，有效降低模型對特定神經元的過度依賴，減少過擬合風險。","src":"guide","id":257},
{"paper":"指引","subject":"科目三","num":8,"q":"在模型壓縮技術中，知識蒸餾（Knowledge Distillation）的主要目的是什麼？","opts":["減少資料維度","降低參數數量使模型更小","將大型模型的知識轉移至小型模型","增強資料平衡"],"ans":"C","note":"Knowledge Distillation是利用大型、高性能的教師模型，將其知識以軟標籤（soft labels）的形式傳遞給小型學生模型，讓學生模型在參數較少的情況下，仍維持接近的預測能力。","src":"guide","id":258},
{"paper":"指引","subject":"科目三","num":9,"q":"在優化器中，哪一個方法會自動調整每個參數的學習率，特別適用於稀疏資料？","opts":["Momentum","Adagrad","Adam","SGD"],"ans":"B","note":"Adagrad能針對每個參數調整不同的學習率，累積梯度平方和後，自動減小常被更新參數的學習步伐。適合處理特徵稀疏的場景，如文字分析，但學習率會不斷衰減至極小值，需留意訓練是否停滯。","src":"guide","id":259},
{"paper":"指引","subject":"科目三","num":10,"q":"One-hot Encoding在什麼情況下可能造成模型的運算負擔加重？","opts":["缺失值多的資料","資料集中某類別種類10種","類別變數具有高基數（High Cardinality）","資料集中無重複樣本"],"ans":"C","note":"One-hot Encoding會為每個不同類別產生獨立欄位，若類別數過多，會導致特徵維度爆炸，增加記憶體使用與模型訓練的負擔，尤其在資料量大時更明顯。隨著機器學習技術與AI相關服務廣泛應用於各類產業，資料治理議題隨之成為企業部署AI系統時的核心關鍵。除技術實作挑戰外，企業更需面對隱私保護、資訊安全與法規遵循的壓力，以及演算法偏見與公平性的社會責任。機器學習治理的目的在於系統性控管資料與模型風險，確保AI應用在合法、安全、公平的原則下運作。","src":"guide","id":260},
{"paper":"指引","subject":"科目三","num":1,"q":"在個人資料保護法規的框架下，下列哪一組資訊單獨使用時，最明確地被歸類為「直接識別個人身份資訊（Directly Identifiable Information, PII）」？","opts":["出生日期、郵遞區號、職業","網站Cookie ID、設備IP位址、地理定位資訊","姓名、電子郵件地址、身分證字號","網路行為模式、匿名化統計數據、加密後的密碼雜湊值"],"ans":"C","note":"「直接識別個人身份資訊（PII）」是指無需透過其他資訊輔助，單獨即可明確辨識出特定個人的資料。（A）出生日期、郵遞區號和職業等資訊單獨無法直接識別特定個人，通常需要結合其他資訊才能達到識別效果，屬於準識別資訊（Quasi-Identifiers）。（B）網站Cookie ID、IP位址和地理定位資訊雖然屬於識別符號，且在特定情境下可被追溯或結合其他資訊後具有識別性，但其本身通常不被視為單獨可直接指向特定個人的PII。通常被歸類為間接識別資訊。","src":"guide","id":261},
{"paper":"指引","subject":"科目三","num":2,"q":"以下哪一種資料處理方式屬於「隨機擾動（Noise Injection）」？","opts":["把姓名改成代號","將薪資加入隨機誤差","將地址改成縣市級別","以星號遮蔽身分證號"],"ans":"B","note":"即便進行匿名化，外部資料比對仍可能造成再識別風險，因此須強化匿名化措施或限制資料使用情境，才能降低風險。","src":"guide","id":262},
{"paper":"指引","subject":"科目三","num":3,"q":"在AI偏見治理中，對不同群體調整模型預測閾值，屬於哪一種偏見修正方法？","opts":["資料泛化","結果門檻調整","模型剪枝","資料增強"],"ans":"B","note":"結果門檻調整（Threshold Adjustment）屬於模型後處理方式，透過改變不同群體的決策門檻，以平衡模型在不同群體間的預測公平性。","src":"guide","id":263},
{"paper":"指引","subject":"科目三","num":4,"q":"若企業想確保AI模型在不同群體間「真正該被選擇者」皆有同等機會被正確預測，應採用哪一個公平性指標？","opts":["Equal Opportunity","Demographic Parity","K-Anonymity","T-Closeness"],"ans":"A","note":"Equal Opportunity著重在實際應獲得正向結果的個案，在不同群體間應具有相同的被正確預測機率，尤其適用於醫療、社會福利等情境。","src":"guide","id":264},
{"paper":"指引","subject":"科目三","num":5,"q":"若企業欲在AI專案中降低敏感特徵（如性別）的影響，可以採取哪種模型內部處理方式？","opts":["對抗式去偏模型","模型蒸餾","雜湊處理","結果門檻調整"],"ans":"A","note":"對抗式去偏透過訓練一個對抗網路，迫使主模型無法預測敏感屬性，從而降低模型對敏感特徵的依賴，是常見的公平性處理技術。","src":"guide","id":265},
{"paper":"指引","subject":"科目三","num":6,"q":"若資料集中存在群體樣本數不均，造成模型偏向多數群體，適合採用哪種技術？","opts":["權重初始化","權重衰減","類別重加權","全量訓練"],"ans":"C","note":"類別重加權能在模型訓練時賦予少數類別更高權重，提升模型對少數群體的辨識能力，是處理不平衡資料常見的方法。","src":"guide","id":266},
{"paper":"指引","subject":"科目三","num":7,"q":"T-接近性（T-Closeness）技術主要是為了降低什麼風險？","opts":["機率分佈差異造成的識別風險","資料重複風險","訓練時間過長","演算法震盪問題"],"ans":"A","note":"T-Closeness要求群組內敏感屬性的分佈，需與全體資料集分佈相近，以防止透過分佈偏差推測個人特徵，是進階的隱私保護技術。","src":"guide","id":267},
{"paper":"指引","subject":"科目三","num":8,"q":"在AI公平性治理中，企業應建立什麼跨部門組織，確保公平性納入日常決策流程？","opts":["模型剪枝委員會","AI蒸餾中心","公平性審查委員會","隨機抽樣團隊"],"ans":"C","note":"公平性審查委員會匯集法務、技術、產品與倫理等部門，負責評估AI系統的偏見風險，是企業治理AI公平性的重要機制。","src":"guide","id":268},
{"paper":"指引","subject":"科目三","num":9,"q":"若企業欲降低AI模型因少數群體樣本過少而造成的過擬合風險，可以採用哪種資料增強方法？","opts":["SMOTE","Softmax","Momentum","Dropout"],"ans":"A","note":"SMOTE（Synthetic Minority Over-sampling Technique）透過合成新樣本，擴增少數類別資料，有助於平衡類別分佈，降低過擬合及模型偏誤風險。","src":"guide","id":269},
{"paper":"指引","subject":"科目三","num":10,"q":"下列哪一項不是常見的隱私保護基礎技術？","opts":["遮蔽（Masking）","泛化（Generalization）","知識蒸餾（Knowledge Distillation）","分桶（Bucketing）"],"ans":"C","note":"知識蒸餾是用於模型壓縮與加速的技術，並非基礎隱私保護技術。隱私保護常用技術包括遮蔽、泛化及分桶，用來降低個資識別風險。","src":"guide","id":270}
];

/* ==================== APP STATE ==================== */
const Q_BY_ID = {};
QUESTIONS.forEach(q => { Q_BY_ID[q.id] = q; });

const PAPER_LABELS = { '114-2':'114-2 歷屆公告', '115-1':'115-1 歷屆公告', '指引':'學習指引練習題' };
const PAPER_COLOR = { '114-2':'--s1', '115-1':'--s3', '指引':'--brand' };

let progress = {};      // id -> {seen, lastCorrect, correctCount, wrongCount}
let starred = new Set();
let session = null;     // {label, ids, idx, answers:{id:letter}, locked:{id:bool}, exam, startedAt, endAt, result}
let examTimerInterval = null;
const EXAM_DURATION_MS = 70 * 60 * 1000;
let modalOkHandler = null;

/* ==================== STORAGE ==================== */
const Store = {
  available: true,
  init(){
    try{
      const p = localStorage.getItem('ipas_quiz_progress');
      const s = localStorage.getItem('ipas_quiz_starred');
      const t = localStorage.getItem('ipas_quiz_theme');
      progress = p ? JSON.parse(p) : {};
      starred = new Set(s ? JSON.parse(s) : []);
      document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
    }catch(e){
      this.available = false;
      progress = {}; starred = new Set();
      const note = document.getElementById('store-note');
      if(note) note.textContent = '⚠️ 此瀏覽器無法儲存進度，重新整理後將會遺失。';
    }
  },
  saveProgress(){ try{ localStorage.setItem('ipas_quiz_progress', JSON.stringify(progress)); }catch(e){} },
  saveStarred(){ try{ localStorage.setItem('ipas_quiz_starred', JSON.stringify([...starred])); }catch(e){} },
  saveTheme(t){ try{ localStorage.setItem('ipas_quiz_theme', t); }catch(e){} }
};

/* ==================== HELPERS ==================== */
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function paperIds(paper){ return QUESTIONS.filter(q => q.paper === paper).map(q => q.id); }
function subjectIds(subject){ return QUESTIONS.filter(q => q.subject === subject).map(q => q.id); }
function weakIds(){ return QUESTIONS.filter(q => { const p = progress[q.id]; return p && p.lastCorrect === false; }).map(q => q.id); }
function starredIds(){ return QUESTIONS.filter(q => starred.has(q.id)).map(q => q.id); }
function paperStats(paper){
  const ids = paperIds(paper);
  let seen = 0, correct = 0;
  ids.forEach(id => { const p = progress[id]; if(p && p.seen){ seen++; if(p.lastCorrect) correct++; } });
  return { total: ids.length, seen, correct, pct: ids.length ? Math.round(seen / ids.length * 100) : 0 };
}
function overallStats(){
  let done = 0, correct = 0;
  Object.values(progress).forEach(p => { if(p && p.seen){ done++; if(p.lastCorrect) correct++; } });
  return { done, correct, acc: done ? Math.round(correct / done * 100) : null };
}
function updateTopStats(){
  const s = overallStats();
  const done = document.getElementById('ts-done');
  const acc = document.getElementById('ts-acc');
  if(done) done.textContent = s.done;
  if(acc) acc.textContent = s.acc === null ? '—' : s.acc + '%';
}
function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function formatTime(ms){
  if(ms < 0) ms = 0;
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
let toastTimer = null;
function toast(msg){
  let el = document.getElementById('toast-el');
  if(!el){
    el = document.createElement('div');
    el.id = 'toast-el';
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:999px;font-size:13.5px;z-index:200;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  requestAnimationFrame(() => { el.style.opacity = '1'; });
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

/* ==================== MODAL ==================== */
function openModal(title, bodyHtml, okText, onOk, okOnly){
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').innerHTML = bodyHtml;
  const okBtn = document.getElementById('m-ok');
  okBtn.textContent = okText || '確定';
  okBtn.style.display = onOk === null ? 'none' : '';
  modalOkHandler = onOk;
  okBtn.onclick = () => { if(modalOkHandler) modalOkHandler(); };
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  modalOkHandler = null;
}

/* ==================== ROUTING ==================== */
function go(view){
  clearExamTimer();
  if(view === 'home') renderHome();
  else if(view === 'quiz') renderQuiz();
  else if(view === 'result') renderResult();
  window.scrollTo({ top: 0, behavior: 'auto' });
}

/* ==================== THEME ==================== */
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  Store.saveTheme(next);
}

/* ==================== HOME VIEW ==================== */
function renderHome(){
  const app = document.getElementById('app');
  updateTopStats();
  const overall = overallStats();
  const weak = weakIds();
  const star = starredIds();

  const paperCards = ['114-2','115-1','指引'].map(p => {
    const st = paperStats(p);
    const colorVar = PAPER_COLOR[p];
    return `
      <div class="pcard" onclick="openPaper('${p}')">

        <h3>${p === '指引' ? '學習指引練習題' : p + ' 公告試題'}</h3>
        <div class="meta">共 ${st.total} 題 · 科目一 + 科目三</div>
        <div class="pbar"><i style="width:${st.pct}%; background:var(${colorVar})"></i></div>
        <div class="stat"><span>已作答 <b>${st.seen}</b>/${st.total}</span><span>正確 <b>${st.correct}</b></span></div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <section class="hero fade">
      <span class="eyebrow">iPAS · 中級 AI 應用規劃師</span>
      <h1>刷題到熟練，<span class="hl">穩穩上考場</span></h1>
      <p>整理 114-2、115-1 歷屆公告試題與官方學習指引練習題，共 ${QUESTIONS.length} 題。練習模式即時對答案，模擬測驗限時 70 分鐘、比照正式節奏。</p>
      <div class="cta-row">
        <button class="btn btn-primary" onclick="openExamPicker()">開始模擬測驗</button>
        <button class="btn btn-ghost" onclick="document.getElementById('papers-sec').scrollIntoView({behavior:'smooth'})">瀏覽題庫</button>
      </div>
      <div class="chips">
        <button class="chip" onclick="startWeak()"><span class="dot" style="background:var(--bad)"></span>弱點複習<span class="cnt">${weak.length}</span></button>
        <button class="chip" onclick="startStarred()"><span class="dot" style="background:var(--hi)"></span>已收藏<span class="cnt">${star.length}</span></button>
        <button class="chip" onclick="startAll()"><span class="dot" style="background:var(--brand)"></span>全部題目<span class="cnt">${QUESTIONS.length}</span></button>
      </div>
    </section>

    <section id="papers-sec">
      <div class="sec-head"><h2>題庫</h2></div>
      <div class="papers">${paperCards}</div>
    </section>
  `;
}

function openPaper(paper){
  const html = `
    <p style="margin:0 0 6px">選擇要練習的科目範圍：</p>
    <div class="seg">
      <button class="on" id="seg-all" onclick="pickSubjectSeg('all')">全部</button>
      <button id="seg-1" onclick="pickSubjectSeg('s1')">科目一</button>
      <button id="seg-3" onclick="pickSubjectSeg('s3')">科目三</button>
    </div>
  `;
  window._pendingPaperSubject = 'all';
  openModal('練習：' + (paper === '指引' ? '學習指引練習題' : paper), html, '開始練習', () => {
    closeModal();
    let ids;
    if(window._pendingPaperSubject === 's1') ids = QUESTIONS.filter(q => q.paper === paper && q.subject === '科目一').map(q => q.id);
    else if(window._pendingPaperSubject === 's3') ids = QUESTIONS.filter(q => q.paper === paper && q.subject === '科目三').map(q => q.id);
    else ids = paperIds(paper);
    startSession(ids, (paper === '指引' ? '學習指引練習題' : paper + ' 公告試題') + ' · 練習模式', false);
  });
}
function pickSubjectSeg(which){
  window._pendingPaperSubject = which;
  ['all','1','3'].forEach(k => document.getElementById('seg-' + k).classList.remove('on'));
  const map = { all:'seg-all', s1:'seg-1', s3:'seg-3' };
  document.getElementById(map[which]).classList.add('on');
}

function openExamPicker(){
  const html = `
    <p style="margin:0 0 10px">模擬測驗涵蓋科目一與科目三，作答期間 70 分鐘內完成，時間到將自動交卷。</p>
    <div class="seg">
      <button class="on" id="exam-seg-114" onclick="pickExamSeg('114-2')">114-2（100 題）</button>
      <button id="exam-seg-115" onclick="pickExamSeg('115-1')">115-1（100 題）</button>
    </div>
  `;
  window._pendingExamPaper = '114-2';
  openModal('選擇模擬測驗年度', html, '開始測驗（70 分鐘內作答完成）', () => {
    closeModal();
    const ids = shuffle(paperIds(window._pendingExamPaper));
    startSession(ids, window._pendingExamPaper + ' 模擬測驗', true);
  });
}
function pickExamSeg(paper){
  window._pendingExamPaper = paper;
  document.getElementById('exam-seg-114').classList.toggle('on', paper === '114-2');
  document.getElementById('exam-seg-115').classList.toggle('on', paper === '115-1');
}

function startWeak(){
  const ids = weakIds();
  if(!ids.length){ toast('目前沒有需要複習的弱點題目'); return; }
  startSession(shuffle(ids), '弱點複習 · 練習模式', false);
}
function startStarred(){
  const ids = starredIds();
  if(!ids.length){ toast('尚未收藏任何題目'); return; }
  startSession(ids, '已收藏題目 · 練習模式', false);
}
function startAll(){
  startSession(shuffle(QUESTIONS.map(q => q.id)), '全部題目 · 練習模式', false);
}

/* ==================== SESSION ==================== */
function startSession(ids, label, exam){
  clearExamTimer();
  if(!ids || !ids.length){ toast('沒有符合條件的題目'); return; }
  session = { label, ids, idx: 0, answers: {}, locked: {}, exam: !!exam, startedAt: Date.now(), result: null };
  if(exam) session.endAt = Date.now() + EXAM_DURATION_MS;
  go('quiz');
  if(exam) startExamTimer();
}

/* ==================== QUIZ VIEW ==================== */
function renderQuiz(){
  const app = document.getElementById('app');
  if(!session){ go('home'); return; }
  const total = session.ids.length;
  const qid = session.ids[session.idx];
  const q = Q_BY_ID[qid];
  const isExam = session.exam;
  const answered = session.answers[qid];
  const locked = isExam ? (answered !== undefined) : !!session.locked[qid];
  const progressPct = Math.round(((session.idx) / total) * 100);
  const answeredCount = Object.keys(session.answers).length;

  const optsHtml = q.opts.map((opt, i) => {
    const letter = 'ABCD'[i];
    let cls = 'opt';
    if(locked){
      cls += ' locked';
      if(letter === q.ans) cls += ' correct';
      else if(letter === answered) cls += ' wrong';
      else cls += ' dim';
    } else if(answered === letter){
      cls += ' sel';
    }
    return `<button class="${cls}" ${locked ? 'disabled' : ''} onclick="selectOption('${letter}')">
      <span class="key">${letter}</span><span class="txt">${esc(opt)}</span>
    </button>`;
  }).join('');

  const showFeedback = locked && !isExam;
  const isCorrect = answered === q.ans;
  const feedbackHtml = showFeedback ? `
    <div class="feedback show ${isCorrect ? 'r-ok' : 'r-bad'}">
      <div class="ft">${isCorrect ? '✓ 答對了' : '✗ 答錯了，正確答案是 ' + q.ans}</div>
      ${q.note ? `<div class="note">${esc(q.note)}</div>` : ''}
    </div>` : '';

  const paletteCells = session.ids.map((id, i) => {
    let cls = 'pcell';
    if(i === session.idx) cls += ' cur';
    const a = session.answers[id];
    if(a !== undefined){
      if(isExam) cls += ' ans';
      else { const p = progress[id]; cls += (p && p.lastCorrect) ? ' ok' : ' no'; }
    }
    return `<button class="${cls}" onclick="jumpTo(${i})">${i + 1}</button>`;
  }).join('');

  app.innerHTML = `
    <div class="qtopbar">
      <span class="back" onclick="leaveQuiz()">← 返回</span>
      <div class="qprog"><i style="width:${progressPct}%"></i></div>
      <span class="qcount">${session.idx + 1} / ${total}</span>
      ${isExam ? `<span class="exam-timer" id="exam-timer">--:--</span>` : ''}
    </div>

    <div class="qcard fade">
      <div class="qmeta">
        <span class="pill">${esc(q.paper === '指引' ? '學習指引' : q.paper)}</span>
        <span class="pill">${esc(q.subject)}</span>
        <span class="pill">第 ${q.num} 題</span>
        <button class="star ${starred.has(q.id) ? 'on' : ''}" onclick="toggleStar(${q.id})" title="收藏">★</button>
      </div>
      <div class="qtext">${esc(q.q)}</div>
      ${q.code ? `<div class="qcode">${esc(q.code)}</div>` : ''}
      <div class="opts">${optsHtml}</div>
      ${feedbackHtml}
      <div class="qnav">
        <button class="btn btn-ghost btn-sm" onclick="prevQ()" ${session.idx === 0 ? 'disabled' : ''}>上一題</button>
        <span class="spacer"></span>
        <span class="linklike" onclick="togglePalette()">題號總覽</span>
        ${session.idx === total - 1
          ? (isExam ? `<button class="btn btn-primary btn-sm" onclick="submitExam()">交卷</button>`
                     : `<button class="btn btn-primary btn-sm" onclick="finishPractice()">完成練習</button>`)
          : `<button class="btn btn-primary btn-sm" onclick="nextQ()">下一題</button>`}
      </div>
      <div class="palette" id="palette">
        <h4>題號總覽（已作答 ${answeredCount} / ${total}）</h4>
        <div class="pgrid">${paletteCells}</div>
        <div class="plegend">
          ${isExam
            ? `<span><i style="background:var(--brand-soft);border-color:var(--brand)"></i>已作答</span>`
            : `<span><i style="background:var(--ok-soft);border-color:var(--ok)"></i>答對</span><span><i style="background:var(--bad-soft);border-color:var(--bad)"></i>答錯</span>`}
        </div>
      </div>
    </div>
  `;

  if(isExam) updateExamTimerDisplay();
}

function togglePalette(){
  document.getElementById('palette').classList.toggle('show');
}

function selectOption(letter){
  if(!session) return;
  const qid = session.ids[session.idx];
  const q = Q_BY_ID[qid];
  const isExam = session.exam;
  if(isExam){
    session.answers[qid] = letter;
    renderQuiz();
    return;
  }
  if(session.locked[qid]) return;
  session.answers[qid] = letter;
  session.locked[qid] = true;
  const correct = letter === q.ans;
  const p = progress[qid] || { seen: false, correctCount: 0, wrongCount: 0 };
  p.seen = true;
  p.lastCorrect = correct;
  if(correct) p.correctCount = (p.correctCount || 0) + 1;
  else p.wrongCount = (p.wrongCount || 0) + 1;
  progress[qid] = p;
  Store.saveProgress();
  renderQuiz();
}

function jumpTo(i){
  if(!session) return;
  session.idx = i;
  renderQuiz();
}
function prevQ(){
  if(!session || session.idx === 0) return;
  session.idx--;
  renderQuiz();
}
function nextQ(){
  if(!session || session.idx >= session.ids.length - 1) return;
  session.idx++;
  renderQuiz();
}
function toggleStar(qid){
  if(starred.has(qid)) starred.delete(qid);
  else starred.add(qid);
  Store.saveStarred();
  renderQuiz();
}

function leaveQuiz(){
  if(!session){ go('home'); return; }
  const answeredCount = Object.keys(session.answers).length;
  if(answeredCount > 0 && answeredCount < session.ids.length){
    openModal('離開本次練習？', '目前已作答 ' + answeredCount + ' / ' + session.ids.length + ' 題，離開後進度不會保留為測驗結果，但已作答題目的紀錄仍會保存。確定要離開嗎？', '確定離開', () => {
      closeModal();
      clearExamTimer();
      session = null;
      go('home');
    });
  } else {
    clearExamTimer();
    session = null;
    go('home');
  }
}

function finishPractice(){
  clearExamTimer();
  const answeredCount = Object.keys(session.answers).length;
  toast('練習完成，已作答 ' + answeredCount + ' / ' + session.ids.length + ' 題');
  session = null;
  go('home');
}

/* ==================== EXAM TIMER ==================== */
function startExamTimer(){
  clearExamTimer();
  updateExamTimerDisplay();
  examTimerInterval = setInterval(() => {
    if(!session || !session.exam){ clearExamTimer(); return; }
    const remain = session.endAt - Date.now();
    updateExamTimerDisplay();
    if(remain <= 0){
      clearExamTimer();
      if(document.querySelector('.qcard')) autoSubmitExam();
    }
  }, 1000);
}
function updateExamTimerDisplay(){
  const el = document.getElementById('exam-timer');
  if(!el || !session || !session.endAt) return;
  const remain = session.endAt - Date.now();
  el.textContent = formatTime(remain);
  el.classList.toggle('warn', remain <= 5 * 60 * 1000);
}
function clearExamTimer(){
  if(examTimerInterval){ clearInterval(examTimerInterval); examTimerInterval = null; }
}
function autoSubmitExam(){
  toast('時間到，自動交卷');
  gradeExam();
}
function submitExam(){
  const total = session.ids.length;
  const answeredCount = Object.keys(session.answers).length;
  if(answeredCount < total){
    openModal('尚有題目未作答', '你還有 ' + (total - answeredCount) + ' 題尚未作答，確定要交卷嗎？', '確定交卷', () => {
      closeModal();
      gradeExam();
    });
  } else {
    gradeExam();
  }
}
function gradeExam(){
  clearExamTimer();
  if(!session) return;
  let correct = 0;
  const review = [];
  session.ids.forEach(id => {
    const q = Q_BY_ID[id];
    const given = session.answers[id];
    const isCorrect = given === q.ans;
    if(isCorrect) correct++;
    const p = progress[id] || { seen: false, correctCount: 0, wrongCount: 0 };
    p.seen = true;
    p.lastCorrect = isCorrect;
    if(isCorrect) p.correctCount = (p.correctCount || 0) + 1;
    else p.wrongCount = (p.wrongCount || 0) + 1;
    progress[id] = p;
    review.push({ id, given, correct: isCorrect });
  });
  Store.saveProgress();
  const total = session.ids.length;
  const score = Math.round((correct / total) * 100);
  session.result = { correct, total, score, review };
  go('result');
}

/* ==================== RESULT VIEW ==================== */
function renderResult(){
  const app = document.getElementById('app');
  if(!session || !session.result){ go('home'); return; }
  const r = session.result;
  const pass = r.score >= 60;
  const circumference = 2 * Math.PI * 80;
  const dash = circumference * (r.score / 100);

  const reviewHtml = r.review.map(item => {
    const q = Q_BY_ID[item.id];
    return `
      <div class="rev ${item.correct ? 'ok' : ''}" onclick="reviewOne(${item.id})">
        <div class="h"><span class="pill">${esc(q.paper === '指引' ? '學習指引' : q.paper)}</span><span>${esc(q.subject)} · 第 ${q.num} 題</span></div>
        <div class="q">${esc(q.q)}</div>
        <div class="ans">
          你的答案：<b class="${item.correct ? 'tag-ok' : 'tag-bad'}">${item.given || '未作答'}</b>　正確答案：<b class="tag-ok">${q.ans}</b>
        </div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <div class="result fade">
      <div class="eyebrow">${esc(session.label)}</div>
      <div class="ring-wrap">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="80" fill="none" stroke="var(--line)" stroke-width="14"/>
          <circle cx="90" cy="90" r="80" fill="none" stroke="${pass ? 'var(--ok)' : 'var(--bad)'}" stroke-width="14"
            stroke-dasharray="${dash} ${circumference}" stroke-linecap="round" transform="rotate(-90 90 90)"/>
        </svg>
        <div class="score"><div class="big">${r.score}</div><div class="lbl">分</div></div>
      </div>
      <div class="verdict ${pass ? 'pass' : 'fail'}">${pass ? '恭喜通過' : '尚未達到及格標準'}（60 分及格）</div>
      <div class="rstats">
        <div class="it"><div class="n">${r.correct}</div><div class="l">答對</div></div>
        <div class="it"><div class="n">${r.total - r.correct}</div><div class="l">答錯</div></div>
        <div class="it"><div class="n">${r.total}</div><div class="l">總題數</div></div>
      </div>
      <div class="cta-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="go('home')">回首頁</button>
      </div>
      <div class="review-list">${reviewHtml}</div>
    </div>
  `;
}

function reviewOne(qid){
  const ids = session ? session.ids : [qid];
  const idx = ids.indexOf(qid);
  clearExamTimer();
  session = { label: '題目回顧', ids, idx: idx >= 0 ? idx : 0, answers: {}, locked: {}, exam: false, startedAt: Date.now(), result: null };
  const q = Q_BY_ID[qid];
  session.answers[qid] = null;
  session.locked[qid] = true;
  go('quiz');
}

/* ==================== IMPORT / EXPORT ==================== */
function exportData(e){
  if(e) e.preventDefault();
  const data = { progress, starred: [...starred], exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ipas_quiz_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('已匯出備份');
}
function importData(e){
  if(e) e.preventDefault();
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = () => {
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        progress = data.progress || {};
        starred = new Set(data.starred || []);
        Store.saveProgress();
        Store.saveStarred();
        toast('已匯入備份');
        go('home');
      }catch(err){
        toast('匯入失敗，檔案格式不正確');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

/* ==================== INIT ==================== */
Store.init();
go('home');
